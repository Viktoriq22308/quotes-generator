<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор на позитивни цитати</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74ebe1 0%, #d4a5ec 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 { color: #4a4a4a; font-size: 24px; margin-bottom: 25px; }
        .quote-box {
            font-size: 20px;
            font-style: italic;
            color: #333;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            border-left: 5px solid #a18cd1;
            padding-left: 15px;
        }
        button {
            background: #a18cd1;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s ease;
        }
        button:hover { background: #fbc2eb; color: #333; transform: scale(1.05); }
        .badge {
            display: inline-block;
            padding: 8px 15px;
            border-radius: 15px;
            font-size: 13px;
            font-weight: bold;
            margin-top: 15px;
            background: #e2d9f3;
            color: #513c75;
            border: 1px solid #b39ddb;
        }
        .time { font-size: 11px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1>✨ Цитат за добро настроение ✨</h1>
    <div class="quote-box" id="quote-text">Кликнете на бутона, за да заредите мисъл за деня...</div>
    <button onclick="fetchQuote()">Зареди нов цитат</button>
    <br>
    <div class="badge" id="status-badge" style="display: none;"></div>
    <div class="time" id="sync-time"></div>
</div>

<script>
    async function fetchQuote() {
        try {
            const response = await fetch('/api/quote');
            const data = await response.json();
            
            document.getElementById('quote-text').innerText = `"${data.quote}"`;
            
            const badge = document.getElementById('status-badge');
            badge.style.display = 'inline-block';
            badge.innerText = `📊 Общо кликвания (Памет Redis): ${data.clicks}`;
            
            document.getElementById('sync-time').innerText = `Последна синхронизация: ${data.timestamp}`;
        } catch (error) {
            document.getElementById('quote-text').innerText = 'Грешка при свързване с бекенда.';
        }
    }
</script>
</body>
</html>
