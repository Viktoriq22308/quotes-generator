services:
  frontend:
    build: ./frontend
    container_name: quotes-frontend
    ports:
      - "8081:8080" 
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: quotes-backend
    ports:
      - "5001:5000" 
    environment:
      - REDIS_URL=redis://redis-cache:6379
    depends_on:
      - redis-cache

  redis-cache:
    image: redis:alpine
    container_name: quotes-redis-cache
    ports:
      - "6380:6379" 